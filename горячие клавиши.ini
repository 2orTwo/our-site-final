ctl + w - закрыть вкладку
ctl + b - зак\откр боковую панель
ctl + x - удалить строку
ctl + tab - пермещатся между вкладками
ctl + l - выделить строку
ctl + g - поиск строки
ctl + alt - переместить строку
ctl + n - создать новый Фаил и открыть его
ctl + shift + e - переход на боковою панель
alt + 1,2,3 - перемещатся по вкладкам
Shift + Del — удалить строку целиком.
Shift + Alt + ↓ / ↑ — дублирование строки с курсором вниз.
F2 — переименовать переменную.